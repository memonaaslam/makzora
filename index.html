    --gold-soft:#E4C77A;
    --grad: linear-gradient(120deg, var(--purple) 0%, var(--purple-light) 35%, var(--teal) 100%);
    --grad-soft: linear-gradient(120deg, rgba(142,46,158,0.08), rgba(15,168,154,0.08));
    --radius-lg: 24px;
    --radius-md: 16px;
    --shadow-card: 0 20px 45px -20px rgba(35,33,41,0.18);
    --shadow-soft: 0 8px 24px -10px rgba(35,33,41,0.10);
  }

  *{margin:0;padding:0;box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  body{
    font-family:'Inter',sans-serif;
    color:var(--charcoal);
    background:var(--white);
    line-height:1.6;
    -webkit-font-smoothing:antialiased;
    overflow-x:hidden;
  }
  h1,h2,h3,h4{font-family:'Poppins',sans-serif; font-weight:700; line-height:1.15; letter-spacing:-0.01em;}
  p{color:var(--charcoal-soft);}
  a{text-decoration:none; color:inherit;}
  ul{list-style:none;}
  img{max-width:100%; display:block;}
  section{position:relative; padding:120px 8vw;}
  .container{max-width:1240px; margin:0 auto; position:relative; z-index:2;}
  .eyebrow{
    display:inline-flex; align-items:center; gap:8px;
    font-family:'Poppins',sans-serif; font-weight:600; font-size:13px;
    letter-spacing:0.06em; text-transform:uppercase;
    color:var(--purple); margin-bottom:18px;
  }
  .eyebrow::before{content:''; width:18px; height:1.5px; background:var(--gold);}
  .section-head{max-width:680px; margin-bottom:56px;}
  .section-head h2{font-size:clamp(28px,3.4vw,42px); margin-bottom:16px; color:var(--charcoal);}
  .section-head p{font-size:17px; max-width:600px;}
  .center{margin-left:auto; margin-right:auto; text-align:center;}

  /* buttons */
  .btn{
    display:inline-flex; align-items:center; justify-content:center; gap:8px;
    padding:15px 30px; border-radius:100px; font-family:'Poppins',sans-serif;
    font-weight:600; font-size:15px; cursor:pointer; border:none;
    transition:transform .35s cubic-bezier(0.16,1,0.3,1), box-shadow .35s cubic-bezier(0.16,1,0.3,1);
    white-space:nowrap;
  }
  .btn-primary{background:var(--grad); color:#fff; box-shadow:0 14px 30px -10px rgba(142,46,158,0.45);}
  .btn-primary:hover{transform:translateY(-2px); box-shadow:0 18px 36px -8px rgba(142,46,158,0.55);}
  .btn-ghost{background:transparent; color:var(--charcoal); border:1.5px solid #E1DEE8;}
  .btn-ghost:hover{border-color:var(--purple); color:var(--purple); transform:translateY(-2px);}
  .btn-dark{background:var(--charcoal); color:#fff;}
  .btn-dark:hover{transform:translateY(-2px); box-shadow:0 14px 30px -12px rgba(0,0,0,0.4);}
  .btn-outline-light{background:transparent; color:#fff; border:1.5px solid rgba(255,255,255,0.5);}
  .btn-outline-light:hover{background:rgba(255,255,255,0.12); transform:translateY(-2px);}

  /* signature chevron motif (echoes the M mark) */
  .chevron-motif{
    position:absolute; width:340px; height:340px; opacity:0.06;
    background:none; pointer-events:none; z-index:0;
  }
  .chevron-motif svg{width:100%; height:100%;}

  /* ---------- HEADER ---------- */
  header{
    position:fixed; top:38px; left:0; right:0; z-index:100;
    display:flex; align-items:center; justify-content:space-between;
    padding:18px 8vw; background:rgba(255,255,255,0.85); backdrop-filter:blur(14px);
    transition:box-shadow .3s ease, padding .3s ease, top .3s ease;
  }
  header.scrolled{box-shadow:0 4px 24px -8px rgba(35,33,41,0.12); padding:12px 8vw; top:0;}
  .top-marquee.hide{transform:translateY(-100%);}
  .logo-lockup{display:flex; align-items:center; gap:10px;}
  .logo-lockup img{width:38px; height:38px; object-fit:contain;}
  .logo-lockup span{font-family:'Poppins',sans-serif; font-weight:700; font-size:21px; color:var(--charcoal);}
  nav ul{display:flex; gap:34px;}
  nav a{font-size:14.5px; font-weight:500; color:var(--charcoal-soft); position:relative; transition:color .2s;}
  nav a:hover{color:var(--purple);}
  .header-actions{display:flex; align-items:center; gap:20px;}
  .menu-toggle{display:none; flex-direction:column; gap:5px; cursor:pointer; background:none; border:none;}
  .menu-toggle span{width:24px; height:2px; background:var(--charcoal);}

  /* ---------- SOFTWARE NAV DROPDOWN ---------- */
  .nav-dropdown{position:relative;}
  .dropdown-trigger{display:inline-flex; align-items:center; gap:4px; cursor:pointer;}
  .dropdown-trigger .chev{transition:transform .25s cubic-bezier(0.16,1,0.3,1);}
  .nav-dropdown.open .dropdown-trigger .chev,
  .nav-dropdown:hover .dropdown-trigger .chev{transform:rotate(180deg);}
  .dropdown-menu{
    position:absolute; top:calc(100% + 14px); left:50%; transform:translateX(-50%) translateY(8px);
    background:#fff; border-radius:14px; box-shadow:var(--shadow-card); border:1px solid #EFEDF3;
    padding:10px; min-width:220px; opacity:0; pointer-events:none; z-index:120;
    transition:opacity .25s cubic-bezier(0.16,1,0.3,1), transform .25s cubic-bezier(0.16,1,0.3,1);
  }
  .nav-dropdown:hover .dropdown-menu,
  .nav-dropdown.open .dropdown-menu{opacity:1; pointer-events:auto; transform:translateX(-50%) translateY(0);}
  .dropdown-menu li{list-style:none;}
  .dropdown-menu a{
    display:block; padding:10px 14px; border-radius:8px; font-size:14px; font-weight:500;
    color:var(--charcoal-soft); white-space:nowrap; transition:background .2s, color .2s;
  }
  .dropdown-menu a:hover{background:var(--bg-gray); color:var(--purple);}

  /* ---------- HERO ---------- */
  .hero{
    padding:210px 8vw 100px; background:var(--bg-gray);
    display:grid; grid-template-columns:1.05fr 0.95fr; gap:50px; align-items:center;
    overflow:hidden;
  }
  .hero-copy h1{font-size:clamp(34px,4.6vw,58px); margin-bottom:22px;}

  .hero-copy p{font-size:18px; max-width:520px; margin-bottom:34px;}
  .hero-actions{display:flex; gap:16px; flex-wrap:wrap;}

  .hero-visual{position:relative; height:480px;}
  .dash-card{
    position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
    width:340px; background:#fff; border-radius:var(--radius-lg);
    box-shadow:var(--shadow-card); padding:26px; z-index:3;
  }
  .dash-card .dash-bar{height:8px; border-radius:6px; background:var(--bg-gray); margin-bottom:12px;}
  .dash-card .dash-bar.short{width:60%;}
  .dash-card .dash-grad{height:80px; border-radius:12px; background:var(--grad); margin:16px 0; display:flex; align-items:flex-end; padding:12px;}
  .dash-card .dash-grad span{color:#fff; font-family:'Poppins',sans-serif; font-weight:600; font-size:13px;}
  .float-chip{
    position:absolute; display:flex; align-items:center; gap:10px;
    background:#fff; padding:12px 16px; border-radius:100px;
    box-shadow:var(--shadow-soft); font-family:'Poppins',sans-serif; font-weight:600; font-size:13px;
    z-index:4; opacity:0; transform:translateY(14px) scale(0.96);
    transition:opacity .9s cubic-bezier(0.16,1,0.3,1), transform .9s cubic-bezier(0.16,1,0.3,1);
  }
  .float-chip.in{opacity:1; transform:translateY(0) scale(1);}
  .float-chip .dot{width:30px; height:30px; border-radius:50%; display:flex; align-items:center; justify-content:center; color:#fff;}
  .chip-1{top:6%; left:0%;}
  .chip-2{top:20%; right:2%;}
  .chip-3{top:52%; left:-4%;}
  .chip-4{bottom:16%; right:-2%;}
  .chip-5{bottom:2%; left:14%;}
  .chip-6{top:2%; right:26%;}

  /* ---------- CARD GRIDS ---------- */
  .grid-6{display:grid; grid-template-columns:repeat(3,1fr); gap:26px;}
  .grid-3{display:grid; grid-template-columns:repeat(3,1fr); gap:26px;}
  .grid-2{display:grid; grid-template-columns:repeat(2,1fr); gap:26px;}

  .service-card{
    background:#fff; border-radius:var(--radius-md); padding:34px 28px;
    box-shadow:var(--shadow-soft); border:1px solid #EFEDF3;
    transition:transform .4s cubic-bezier(0.16,1,0.3,1), box-shadow .4s cubic-bezier(0.16,1,0.3,1); position:relative; overflow:hidden;
  }
  .service-card:hover{transform:translateY(-6px); box-shadow:var(--shadow-card);}
  .service-card .icon-badge{
    width:52px; height:52px; border-radius:14px; background:var(--grad-soft);
    display:flex; align-items:center; justify-content:center; margin-bottom:20px;
  }
  .service-card .icon-badge svg{width:26px; height:26px; stroke:var(--purple);}
  .service-card h3{font-size:19px; margin-bottom:10px;}
  .service-card p{font-size:14.5px;}
  .service-card::after{
    content:''; position:absolute; top:0; right:0; width:64px; height:64px;
    background:var(--grad); opacity:0; clip-path:polygon(100% 0,0 0,100% 100%);
    transition:opacity .3s ease;
  }
  .service-card:hover::after{opacity:0.09;}

  /* ---------- AI AGENTS (dark section) ---------- */
  .agents-section{background:var(--charcoal); color:#fff;}
  .agents-section .section-head h2{color:#fff;}
  .agents-section .section-head p{color:#C9C6D1;}
  .agents-section .eyebrow{color:var(--teal-light);}
  .agents-section .eyebrow::before{background:var(--gold-soft);}
  .agent-grid{display:grid; grid-template-columns:repeat(3,1fr); gap:20px; margin-bottom:44px;}
  .agent-chip{
    background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1);
    border-radius:var(--radius-md); padding:24px; display:flex; align-items:center; gap:14px;
    transition:background .4s cubic-bezier(0.16,1,0.3,1), transform .4s cubic-bezier(0.16,1,0.3,1);
  }
  .agent-chip:hover{background:rgba(255,255,255,0.09); transform:translateY(-4px);}
  .agent-chip .dot{width:40px; height:40px; border-radius:12px; background:var(--grad); flex-shrink:0; display:flex; align-items:center; justify-content:center;}
  .agent-chip .dot svg{width:20px; height:20px; stroke:#fff;}
  .agent-chip span{font-family:'Poppins',sans-serif; font-weight:600; font-size:14.5px;}

  /* ---------- SOFTWARE ---------- */
  .tag-row{display:flex; flex-wrap:wrap; gap:14px; margin-bottom:40px;}
  .tag-pill{
    padding:12px 22px; border-radius:100px; border:1.5px solid #EFEDF3;
    font-family:'Poppins',sans-serif; font-weight:600; font-size:14px;
    background:#fff; transition:border-color .35s cubic-bezier(0.16,1,0.3,1), color .35s cubic-bezier(0.16,1,0.3,1);
  }
  .tag-pill:hover{border-color:var(--teal); color:var(--teal);}

  .split{display:grid; grid-template-columns:0.9fr 1.1fr; gap:60px; align-items:center;}
  .software-visual{
    background:var(--bg-gray); border-radius:var(--radius-lg); padding:32px;
    position:relative; overflow:hidden;
  }
  .code-window{background:var(--charcoal); border-radius:14px; padding:22px; box-shadow:var(--shadow-card);}
  .code-window .dots{display:flex; gap:6px; margin-bottom:16px;}
  .code-window .dots span{width:10px; height:10px; border-radius:50%; background:#4a4753;}
  .code-window .line{height:8px; border-radius:5px; background:#3a3742; margin-bottom:10px;}
  .code-window .line.g{background:var(--grad); width:40%;}
  .code-window .line.t{background:#5c5966; width:70%;}
  .code-window .line.short{width:50%;}

  /* ---------- ACADEMY ---------- */
  .academy-section{background:var(--bg-gray);}
  .course-grid{display:grid; grid-template-columns:repeat(3,1fr); gap:20px; margin-bottom:40px;}
  .course-card{
    background:#fff; border-radius:var(--radius-md); padding:26px; box-shadow:var(--shadow-soft);
    border-left:3px solid var(--gold); transition:transform .4s cubic-bezier(0.16,1,0.3,1);
  }
  .course-card:hover{transform:translateY(-4px);}
  .course-card h4{font-family:'Poppins',sans-serif; font-size:16px; font-weight:600;}

  /* ---------- PORTFOLIO ---------- */
  .portfolio-grid{display:grid; grid-template-columns:repeat(3,1fr); gap:24px;}
  .portfolio-card{
    border-radius:var(--radius-md); overflow:hidden; box-shadow:var(--shadow-soft);
    position:relative; height:260px; display:flex; align-items:flex-end; padding:22px;
    transition:transform .4s cubic-bezier(0.16,1,0.3,1);
  }
  .portfolio-card:hover{transform:translateY(-6px);}
  .portfolio-card:hover .mock-bg{transform:scale(1.06);}
  .portfolio-card .mock-bg{
    position:absolute; inset:0; z-index:0; background-size:cover; background-position:center;
    transition:transform .6s cubic-bezier(0.16,1,0.3,1);
  }
  .portfolio-card span{position:relative; z-index:2; color:#fff; font-family:'Poppins',sans-serif; font-weight:600; font-size:16px;}
  .portfolio-card::before{content:''; position:absolute; inset:0; background:linear-gradient(0deg, rgba(0,0,0,0.7), rgba(0,0,0,0.05) 55%); z-index:1;}
  .portfolio-card.wide{grid-column:span 2;}
  @media (max-width: 1024px){.portfolio-card.wide{grid-column:span 1;}}

  /* ---------- PACKAGES ---------- */
  .packages-section{background:var(--charcoal);}
  .packages-section .section-head h2{color:#fff;}
  .packages-section .section-head p{color:#C9C6D1;}
  .packages-section .eyebrow{color:var(--teal-light);}
  .packages-section .eyebrow::before{background:var(--gold-soft);}
  .pkg-grid{display:grid; grid-template-columns:repeat(5,1fr); gap:18px;}
  .pkg-card{
    background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1);
    border-radius:var(--radius-md); padding:28px 22px; color:#fff;
    display:flex; flex-direction:column; transition:transform .4s cubic-bezier(0.16,1,0.3,1), background .4s cubic-bezier(0.16,1,0.3,1);
  }
  .pkg-card:hover{transform:translateY(-6px); background:rgba(255,255,255,0.08);}
  .pkg-card.featured{border:2px solid var(--gold); background:rgba(201,162,51,0.08);}
  .pkg-badge{
    align-self:flex-start; background:var(--gold); color:var(--charcoal); font-size:11px;
    font-weight:700; padding:4px 12px; border-radius:100px; margin-bottom:14px;
    font-family:'Poppins',sans-serif; text-transform:uppercase; letter-spacing:0.04em;
  }
  .pkg-card h4{font-family:'Poppins',sans-serif; font-size:17px; margin-bottom:10px;}
  .pkg-card p{color:#C9C6D1; font-size:13.5px; flex-grow:1;}

  /* ---------- WHY CHOOSE ---------- */
  .why-grid{display:grid; grid-template-columns:repeat(2,1fr); gap:22px;}
  .why-item{display:flex; gap:16px; align-items:flex-start;}
  .why-item .check{
    width:32px; height:32px; border-radius:50%; background:var(--grad); flex-shrink:0;
    display:flex; align-items:center; justify-content:center; margin-top:2px;
  }
  .why-item .check svg{width:16px; height:16px; stroke:#fff;}
  .why-item h4{font-family:'Poppins',sans-serif; font-size:16.5px; margin-bottom:4px;}
  .why-item p{font-size:14.5px;}

  /* ---------- FINAL CTA ---------- */
  .final-cta{
    background:var(--grad); border-radius:var(--radius-lg); padding:80px 8vw; text-align:center;
    color:#fff; margin:0 8vw 0; position:relative; overflow:hidden;
  }
  .final-cta h2{color:#fff; font-size:clamp(26px,3.4vw,38px); margin-bottom:16px;}
  .final-cta p{color:rgba(255,255,255,0.9); max-width:560px; margin:0 auto 34px;}
  .final-cta .hero-actions{justify-content:center;}

  /* ---------- FOOTER ---------- */
  footer{background:var(--charcoal); color:#C9C6D1; padding:70px 8vw 30px;}
  .footer-top{display:grid; grid-template-columns:1.4fr repeat(3,1fr); gap:40px; padding-bottom:50px; border-bottom:1px solid rgba(255,255,255,0.08);}
  .footer-top .logo-lockup span{color:#fff;}
  .footer-top p{font-size:14px; margin-top:14px; max-width:280px;}
  .footer-col h5{font-family:'Poppins',sans-serif; color:#fff; font-size:14.5px; margin-bottom:16px;}
  .footer-col ul li{margin-bottom:10px; font-size:14px;}
  .footer-col a:hover{color:var(--teal-light);}
  .footer-bottom{display:flex; justify-content:space-between; align-items:center; padding-top:24px; font-size:13px; flex-wrap:wrap; gap:12px;}

  /* ---------- TOP MARQUEE BAR ---------- */
  .top-marquee{
    position:fixed; top:0; left:0; right:0; z-index:101; height:38px;
    background:var(--charcoal); overflow:hidden; display:flex; align-items:center;
    transition:transform .3s cubic-bezier(0.16,1,0.3,1);
  }
  .marquee-track{display:flex; white-space:nowrap; animation:marqueeScroll 24s linear infinite;}
  .marquee-track span{
    font-family:'Poppins',sans-serif; font-weight:500; font-size:12.5px; letter-spacing:0.03em;
    color:#fff; padding:0 28px; display:inline-flex; align-items:center; gap:10px;
  }
  .marquee-track span::after{content:"";display:inline-block;width:7px;height:7px;margin:0 28px;border-radius:50%;background:#c8a45a;vertical-align:middle;box-shadow:0 0 0 4px rgba(200,164,90,.12);}
  @keyframes marqueeScroll{from{transform:translateX(0);} to{transform:translateX(-50%);}}
  @media (prefers-reduced-motion: reduce){.marquee-track{animation:none;}}

  /* ---------- SERVICE TICKER ---------- */
  .ticker-section{padding:56px 0; background:var(--bg-gray); overflow:hidden;}
  .ticker-label{text-align:center; font-size:13px; color:var(--charcoal-soft); font-weight:500; margin-bottom:26px; letter-spacing:0.03em;}
  .ticker-row{display:flex; white-space:nowrap; animation:marqueeScroll 30s linear infinite;}
  .ticker-row .tick-item{
    display:inline-flex; align-items:center; gap:10px; margin:0 14px;
    background:#fff; border:1px solid #EFEDF3; padding:12px 22px; border-radius:100px;
    font-family:'Poppins',sans-serif; font-weight:600; font-size:14px; color:var(--charcoal);
  }
  .tick-item .tick-dot{width:8px; height:8px; border-radius:50%; background:var(--grad);}
  @media (prefers-reduced-motion: reduce){.ticker-row{animation:none; flex-wrap:wrap; justify-content:center;}}

  /* ---------- TYPING COMPARISON ---------- */
  .compare-wrap{display:grid; grid-template-columns:1fr 1fr; gap:24px; margin-bottom:48px;}
  .compare-card{
    background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.1);
    border-radius:var(--radius-md); padding:28px; min-height:230px;
  }
  .compare-card .compare-label{
    display:flex; align-items:center; gap:10px; font-family:'Poppins',sans-serif;
    font-weight:600; font-size:13px; margin-bottom:18px; letter-spacing:0.02em;
  }
  .compare-card.slow .compare-label{color:#D4877E;}
  .compare-card.fast .compare-label{color:var(--teal-light);}
  .compare-card .status-dot{width:8px; height:8px; border-radius:50%;}
  .compare-card.slow .status-dot{background:#D4877E;}
  .compare-card.fast .status-dot{background:var(--teal-light);}
  .compare-text{font-size:15px; line-height:1.7; color:#E4E2E9; min-height:120px;}
  .compare-text .cursor{display:inline-block; width:2px; height:16px; background:currentColor; vertical-align:middle; animation:blink 0.9s step-start infinite;}
  @keyframes blink{50%{opacity:0;}}
  .compare-tag{
    display:inline-block; margin-top:16px; font-size:12px; font-family:'Poppins',sans-serif;
    font-weight:600; padding:5px 14px; border-radius:100px;
  }
  .compare-card.slow .compare-tag{background:rgba(212,135,126,0.14); color:#D4877E;}
  .compare-card.fast .compare-tag{background:rgba(28,201,184,0.14); color:var(--teal-light);}

  /* ---------- INDUSTRY TABS ---------- */
  .industry-tabs{display:flex; gap:10px; flex-wrap:wrap; margin-bottom:36px;}
  .industry-tab{
    padding:11px 22px; border-radius:100px; border:1.5px solid #EFEDF3; background:#fff;
    font-family:'Poppins',sans-serif; font-weight:600; font-size:14px; cursor:pointer;
    color:var(--charcoal-soft); transition:all .3s cubic-bezier(0.16,1,0.3,1);
  }
  .industry-tab.active{background:var(--grad); color:#fff; border-color:transparent;}
  .industry-panel{
    background:var(--bg-gray); border-radius:var(--radius-lg); padding:44px;
    display:grid; grid-template-columns:1fr 1fr; gap:40px; align-items:center; min-height:220px;
  }
  #industryContent, #industryVisual{position:relative; min-height:220px;}
  .industry-content{position:absolute; inset:0; opacity:0; transform:translateY(10px); transition:opacity .5s cubic-bezier(0.16,1,0.3,1), transform .5s cubic-bezier(0.16,1,0.3,1); pointer-events:none;}
  .industry-content.show{opacity:1; transform:translateY(0); pointer-events:auto;}
  .industry-content h3{font-size:22px; margin-bottom:12px;}
  .industry-visual{
    position:absolute; inset:0; border-radius:14px; background-size:cover; background-position:center top;
    box-shadow:var(--shadow-card); opacity:0; transition:opacity .5s cubic-bezier(0.16,1,0.3,1);
  }
  .industry-visual.show{opacity:1;}
  .reveal{opacity:0; transform:translateY(18px); transition:opacity 1s cubic-bezier(0.16,1,0.3,1), transform 1s cubic-bezier(0.16,1,0.3,1);}
  .reveal.in{opacity:1; transform:translateY(0);}

  /* hero rotating word */
  .rotating-word-wrap{display:inline-block; position:relative; vertical-align:bottom; overflow:hidden; height:1.3em; padding-bottom:0.05em;}
  .rotating-word{display:inline-block; background:var(--grad); -webkit-background-clip:text; background-clip:text; color:transparent; opacity:0; transform:translateY(0.4em); transition:opacity .5s cubic-bezier(0.16,1,0.3,1), transform .5s cubic-bezier(0.16,1,0.3,1);}
  .rotating-word.show{opacity:1; transform:translateY(0);}

  /* ---------- RESPONSIVE ---------- */
  @media (max-width: 1024px){
    .grid-6, .grid-3, .agent-grid, .course-grid, .portfolio-grid{grid-template-columns:repeat(2,1fr);}
    .pkg-grid{grid-template-columns:repeat(2,1fr);}
    .why-grid{grid-template-columns:1fr;}
    .split{grid-template-columns:1fr;}
    .hero{grid-template-columns:1fr; padding-top:150px;}
    .hero-visual{height:380px; order:-1;}
    .compare-wrap{grid-template-columns:1fr;}
    .industry-panel{grid-template-columns:1fr;}
    #industryContent, #industryVisual{min-height:220px;}
  }
  @media (max-width: 720px){
    nav, .header-actions .btn-primary{display:none;}
    .menu-toggle{display:flex;}
    section{padding:80px 6vw;}
    .grid-6, .grid-3, .agent-grid, .course-grid, .portfolio-grid, .pkg-grid{grid-template-columns:1fr;}
    .final-cta{margin:0 6vw;}
    nav.mobile-open{
      display:flex; position:fixed; top:70px; left:0; right:0; background:#fff;
      flex-direction:column; padding:20px 6vw; box-shadow:0 12px 24px -8px rgba(0,0,0,0.12);
    }
    nav.mobile-open ul{flex-direction:column; gap:18px;}
    .dropdown-menu{
      position:static; transform:none; opacity:1; pointer-events:none; max-height:0; overflow:hidden;
      box-shadow:none; border:none; padding:0; margin-top:0; min-width:0; transition:max-height .3s cubic-bezier(0.16,1,0.3,1);
    }
    .nav-dropdown.open .dropdown-menu{pointer-events:auto; max-height:400px; margin-top:10px; padding:6px 0 0 14px;}
    .nav-dropdown:hover .dropdown-menu{max-height:0;}
    .nav-dropdown.open:hover .dropdown-menu{max-height:400px;}
  }


  /* ---------- PREMIUM MOTION ENHANCEMENTS ---------- */
  html{scroll-behavior:smooth;}
  body::before, body::after{
    content:''; position:fixed; width:420px; height:420px; border-radius:50%;
    filter:blur(100px); opacity:.12; pointer-events:none; z-index:-1;
    animation:ambientDrift 14s ease-in-out infinite alternate;
  }
  body::before{left:-180px; top:18%; background:var(--purple);}
  body::after{right:-180px; bottom:8%; background:var(--teal); animation-delay:-7s;}
  @keyframes ambientDrift{to{transform:translate3d(70px,-45px,0) scale(1.12);}}

  .scroll-progress{
    position:fixed; top:0; left:0; z-index:9999; height:3px; width:0;
    background:var(--grad); box-shadow:0 0 14px rgba(28,201,184,.55);
    transition:width .08s linear;
  }

  .hero-copy.in .eyebrow{animation:eyebrowPop .8s .08s both cubic-bezier(.16,1,.3,1);}
  .hero-copy.in h1{animation:heroRise 1s .18s both cubic-bezier(.16,1,.3,1);}
  .hero-copy.in p{animation:heroRise 1s .3s both cubic-bezier(.16,1,.3,1);}
  .hero-copy.in .hero-actions{animation:heroRise 1s .42s both cubic-bezier(.16,1,.3,1);}
  @keyframes heroRise{from{opacity:0;transform:translateY(30px) scale(.985)}to{opacity:1;transform:none}}
  @keyframes eyebrowPop{from{opacity:0;letter-spacing:.22em;transform:translateX(-12px)}to{opacity:1;transform:none}}

  .hero-visual::before,.hero-visual::after{
    content:''; position:absolute; border-radius:50%; pointer-events:none;
    filter:blur(8px); opacity:.34;
  }
  .hero-visual::before{width:190px;height:190px;left:7%;top:10%;background:rgba(142,46,158,.25);animation:orbFloat 7s ease-in-out infinite;}
  .hero-visual::after{width:150px;height:150px;right:9%;bottom:8%;background:rgba(28,201,184,.25);animation:orbFloat 8s -3s ease-in-out infinite reverse;}
  @keyframes orbFloat{50%{transform:translate3d(24px,-22px,0) scale(1.12)}}

  .dash-card{animation:dashboardFloat 6s ease-in-out infinite; transform-style:preserve-3d; will-change:transform;}
  @keyframes dashboardFloat{50%{transform:translateY(-10px) rotateX(1.5deg) rotateY(-1.5deg)}}
  .dash-grad{position:relative;overflow:hidden;}
  .dash-grad::after{
    content:'';position:absolute;inset:-50%;background:linear-gradient(110deg,transparent 35%,rgba(255,255,255,.35) 50%,transparent 65%);
    transform:translateX(-65%) rotate(8deg);animation:shineSweep 4.5s 1s infinite;
  }
  @keyframes shineSweep{55%,100%{transform:translateX(65%) rotate(8deg)}}

  .float-chip.in{animation:chipFloat 4.8s ease-in-out infinite;}
  .float-chip:nth-of-type(even).in{animation-delay:-2.2s;}
  @keyframes chipFloat{50%{transform:translateY(-8px) rotate(.7deg)}}

  .btn{position:relative;overflow:hidden;isolation:isolate;}
  .btn::after{
    content:'';position:absolute;top:-40%;left:-75%;width:45%;height:180%;
    background:linear-gradient(90deg,transparent,rgba(255,255,255,.35),transparent);
    transform:skewX(-20deg);transition:left .65s cubic-bezier(.16,1,.3,1);z-index:-1;
  }
  .btn:hover::after{left:135%;}

  .service-card,.agent-chip,.course-card,.portfolio-card,.pkg-card,.why-item,.compare-card{
    will-change:transform; transform-style:preserve-3d;
  }
  .service-card::before,.pkg-card::before,.course-card::before{
    content:'';position:absolute;inset:0;pointer-events:none;opacity:0;
    background:radial-gradient(320px circle at var(--mx,50%) var(--my,50%),rgba(255,255,255,.22),transparent 42%);
    transition:opacity .3s ease;
  }
  .service-card:hover::before,.pkg-card:hover::before,.course-card:hover::before{opacity:1;}
  .icon-badge{transition:transform .5s cubic-bezier(.16,1,.3,1),box-shadow .5s ease;}
  .service-card:hover .icon-badge{transform:translateY(-4px) rotate(-5deg) scale(1.08);box-shadow:0 12px 25px rgba(142,46,158,.16);}
  .agent-chip:hover .dot{animation:iconPulse .75s ease;}
  @keyframes iconPulse{50%{transform:scale(1.13) rotate(7deg)}}

  .section-head.in h2{animation:titleReveal .85s .12s both cubic-bezier(.16,1,.3,1);}
  .section-head.in p{animation:titleReveal .85s .23s both cubic-bezier(.16,1,.3,1);}
  @keyframes titleReveal{from{opacity:0;transform:translateY(22px);filter:blur(5px)}to{opacity:1;transform:none;filter:none}}

  .industry-tab{position:relative;overflow:hidden;}
  .industry-tab.active{animation:tabPulse 2.4s ease-in-out infinite;}
  @keyframes tabPulse{50%{box-shadow:0 8px 28px rgba(142,46,158,.25)}}
  .industry-visual.show{animation:visualZoom .75s both cubic-bezier(.16,1,.3,1);}
  @keyframes visualZoom{from{opacity:0;transform:scale(.965) translateX(14px)}to{opacity:1;transform:none}}

  .final-cta::before,.final-cta::after{
    content:'';position:absolute;border:1px solid rgba(255,255,255,.22);border-radius:50%;pointer-events:none;
    animation:ctaOrbit 9s linear infinite;
  }
  .final-cta::before{width:260px;height:260px;left:-100px;top:-120px;}
  .final-cta::after{width:360px;height:360px;right:-170px;bottom:-210px;animation-direction:reverse;animation-duration:13s;}
  @keyframes ctaOrbit{to{transform:rotate(360deg) scale(1.08)}}

  .reveal-left{opacity:0;transform:translateX(-34px);transition:opacity .9s cubic-bezier(.16,1,.3,1),transform .9s cubic-bezier(.16,1,.3,1)}
  .reveal-right{opacity:0;transform:translateX(34px);transition:opacity .9s cubic-bezier(.16,1,.3,1),transform .9s cubic-bezier(.16,1,.3,1)}
  .reveal-left.in,.reveal-right.in{opacity:1;transform:none}

  @media (prefers-reduced-motion:reduce){
    *,*::before,*::after{animation-duration:.01ms!important;animation-iteration-count:1!important;scroll-behavior:auto!important;transition-duration:.01ms!important;}
  }

</style>
</head>
<body>

<div class="top-marquee" id="topMarquee">
  <div class="marquee-track">
    <span>&copy; 2026 Makzora. All rights reserved.</span>
    <span>Build. Brand. Automate. Grow.</span>
  </div>
</footer>

<script>
  const header = document.getElementById('siteHeader');
  const topMarquee = document.getElementById('topMarquee');
  window.addEventListener('scroll', () => {
    const scrolled = window.scrollY > 20;
    header.classList.toggle('scrolled', scrolled);
    if (topMarquee) topMarquee.classList.toggle('hide', scrolled);
  });

  const menuToggle = document.getElementById('menuToggle');
  const mainNav = document.getElementById('mainNav');
  menuToggle.addEventListener('click', () => {
    mainNav.classList.toggle('mobile-open');
  });
  mainNav.querySelectorAll('a:not(.dropdown-trigger)').forEach(a => a.addEventListener('click', () => mainNav.classList.remove('mobile-open')));

  document.querySelectorAll('.dropdown-trigger').forEach(trigger => {
    trigger.addEventListener('click', (e) => {
      if (window.innerWidth <= 720) {
        e.preventDefault();
        trigger.closest('.nav-dropdown').classList.toggle('open');
      }
    });
  });

  const revealEls = document.querySelectorAll('.reveal');
  revealEls.forEach((el, i) => { el.style.transitionDelay = (i % 3) * 90 + 'ms'; });
  const io = new IntersectionObserver((entries) => {
    entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('in'); io.unobserve(e.target); } });
  }, { threshold: 0.15 });
  revealEls.forEach(el => io.observe(el));

  const chips = document.querySelectorAll('.float-chip');
  chips.forEach((chip, i) => { chip.style.transitionDelay = (i * 90) + 'ms'; });
  const chipIo = new IntersectionObserver((entries) => {
    entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('in'); chipIo.unobserve(e.target); } });
  }, { threshold: 0.2 });
  chips.forEach(c => chipIo.observe(c));

  const words = ['growth', 'branding', 'automation', 'software', 'marketing'];
  const wordEl = document.getElementById('rotatingWord');
  const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  if (wordEl && !reduceMotion) {
    let wi = 0;
    setInterval(() => {
      wordEl.classList.remove('show');
      setTimeout(() => {
        wi = (wi + 1) % words.length;
        wordEl.textContent = words[wi];
        wordEl.classList.add('show');
      }, 400);
    }, 2600);
  }

  function typeInto(el, text, speed, cb){
    let i = 0;
    el.innerHTML = '';
    const cursor = document.createElement('span');
    cursor.className = 'cursor';
    function step(){
      if (i <= text.length){
        el.textContent = text.slice(0, i);
        el.appendChild(cursor);
        i++;
        setTimeout(step, speed);
      } else if (cb) { cb(); }
    }
    step();
  }
  const slowEl = document.getElementById('compareSlow');
  const fastEl = document.getElementById('compareFast');
  function runCompareDemo(){
    if (!slowEl || !fastEl) return;
    if (reduceMotion){
      slowEl.textContent = 'hi im intersted in the... wait sry whats the price again';
      fastEl.textContent = "Hi! Thanks for reaching out \u2014 here's our full price list and availability for this week.";
      return;
    }
    typeInto(slowEl, 'hi im intersted in the... wait sry whats the price again', 90);
    typeInto(fastEl, "Hi! Thanks for reaching out \u2014 here's our full price list and availability for this week.", 22, () => {
      setTimeout(runCompareDemo, 3200);
    });
  }
  const compareSection = document.getElementById('ai-agents');
  if (compareSection){
    const compareIo = new IntersectionObserver((entries) => {
      entries.forEach(e => { if (e.isIntersecting){ runCompareDemo(); compareIo.unobserve(e.target); } });
    }, { threshold: 0.3 });
    compareIo.observe(compareSection);
  }

  const tabsWrap = document.getElementById('industryTabs');
  if (tabsWrap){
    const tabs = tabsWrap.querySelectorAll('.industry-tab');
    const contents = document.querySelectorAll('.industry-content');
    const visuals = document.querySelectorAll('.industry-visual');
    let active = 0, timer;
    function setActive(idx){
      active = idx;
      tabs.forEach(t => t.classList.toggle('active', +t.dataset.i === idx));
      contents.forEach(c => c.classList.toggle('show', +c.dataset.i === idx));
      visuals.forEach(v => v.classList.toggle('show', +v.dataset.i === idx));
    }
    function restartTimer(){
      clearInterval(timer);
      if (!reduceMotion){
        timer = setInterval(() => setActive((active + 1) % tabs.length), 4200);
      }
    }
    tabs.forEach(t => t.addEventListener('click', () => { setActive(+t.dataset.i); restartTimer(); }));
    setActive(0);
    restartTimer();
  }


  // Premium motion additions
  const progress = document.createElement('div');
  progress.className = 'scroll-progress';
  document.body.prepend(progress);
  const updateProgress = () => {
    const max = document.documentElement.scrollHeight - innerHeight;
    progress.style.width = (max > 0 ? (scrollY / max) * 100 : 0) + '%';
  };
  addEventListener('scroll', updateProgress, { passive:true });
  updateProgress();

  // Alternate directional entrances for richer section movement
  document.querySelectorAll('.split > .reveal').forEach((el,i) => {
    el.classList.add(i % 2 ? 'reveal-right' : 'reveal-left');
  });

  // Subtle cursor-reactive light and 3D tilt on desktop
  if (!reduceMotion && matchMedia('(pointer:fine)').matches) {
    const tiltCards = document.querySelectorAll('.service-card,.agent-chip,.course-card,.pkg-card,.compare-card');
    tiltCards.forEach(card => {
      card.addEventListener('pointermove', e => {
        const r = card.getBoundingClientRect();
        const x = (e.clientX-r.left)/r.width;
        const y = (e.clientY-r.top)/r.height;
        card.style.setProperty('--mx', (x*100)+'%');
        card.style.setProperty('--my', (y*100)+'%');
        card.style.transform = `perspective(800px) rotateX(${(0.5-y)*4}deg) rotateY(${(x-0.5)*5}deg) translateY(-5px)`;
      });
      card.addEventListener('pointerleave', () => { card.style.transform = ''; });
    });

    const heroVisual = document.querySelector('.hero-visual');
    const dash = document.querySelector('.dash-card');
    if (heroVisual && dash) {
      heroVisual.addEventListener('pointermove', e => {
        const r=heroVisual.getBoundingClientRect();
        const x=(e.clientX-r.left)/r.width-.5, y=(e.clientY-r.top)/r.height-.5;
        dash.style.transform=`perspective(900px) rotateX(${-y*7}deg) rotateY(${x*9}deg) translate3d(${x*8}px,${y*8}px,0)`;
      });
      heroVisual.addEventListener('pointerleave',()=>dash.style.transform='');
    }
  }

  // Magnetic buttons
  if (!reduceMotion && matchMedia('(pointer:fine)').matches) {
    document.querySelectorAll('.btn').forEach(btn => {
      btn.addEventListener('pointermove', e => {
        const r=btn.getBoundingClientRect();
        btn.style.transform=`translate(${(e.clientX-r.left-r.width/2)*.08}px,${(e.clientY-r.top-r.height/2)*.12}px)`;
      });
      btn.addEventListener('pointerleave',()=>btn.style.transform='');
    });
  }

</script>

</body>
</html>
